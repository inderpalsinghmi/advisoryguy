<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{POST_TITLE}} — {{SITE_TITLE}}</title>
<meta name="description" content="{{POST_EXCERPT}}">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cardo:ital,wght@0,400;0,700;1,400&family=Open+Sans:wght@400;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../assets/style.css">
<script>
(function(w,d,e,u,f,l,n){w[f]=w[f]||function(){(w[f].q=w[f].q||[]).push(arguments);},l=d.createElement(e),l.async=1,l.src=u,n=d.getElementsByTagName(e)[0],n.parentNode.insertBefore(l,n);})(window,document,'script','https://assets.mailerlite.com/js/universal.js','ml');
ml('account', '{{ML_ACCOUNT}}');
</script>
</head>
<body>

<nav class="nav">
  <div class="inner">
    <a class="brand" href="../">{{SITE_TITLE}}</a>
    <ul>
      <li><a href="../">Writing</a></li>
      <li><a href="../about/">About</a></li>
      <li><a href="#subscribe">Subscribe</a></li>
    </ul>
  </div>
</nav>

<main>
  <article class="wrap post">
    <h1>{{POST_TITLE}}</h1>
    <div class="post-meta">
      <span class="date">{{POST_DATE}}</span>
      <span class="tags">{{POST_TAGS}}</span>
    </div>
    <div class="post-body">
      {{POST_BODY}}
    </div>
  </article>

  <section class="subscribe" id="subscribe">
    <h2>Get the next one to your inbox</h2>
    <p class="sub-note">No noise. When there's something worth reading, it'll land.</p>
    <div class="form-wrap">
      <div class="ml-embedded" data-form="{{ML_FORM_ID}}"></div>
    </div>
  </section>
</main>

<footer class="footer">
  <div class="links">
    <a href="mailto:{{EMAIL}}">{{EMAIL}}</a>
    <span>·</span>
    <a href="{{LINKEDIN}}" target="_blank" rel="noopener">LinkedIn</a>
  </div>
  <p style="margin:0">© {{YEAR}} {{AUTHOR}}</p>
</footer>

</body>
</html>
